expert:
  _target_: lagat.interfaces.lacam3.inference.LacamInference
  _convert_: all
  cfg:
    _target_: lagat.interfaces.lacam3.inference.LacamInferenceConfig
    timeouts:
    - 1
    - 5
    time_limit: 30
grid_config:
  _target_: lagat.grid_config_generator.grid_config_generator_factory
  _convert_: all
  cands_num_agents:
  - 32
  - 48
  - 64
  - 80
  obs_radius: 5
  collision_system: soft
  max_episode_steps: 128
  map_type_probs:
  - 1.0
  map_types:
  - _target_: lagat.grid_config_generator.PredefinedMapRangeSettings
    map_fpaths:
    - assets/dense_maze.map
model:
  _target_: lagat.model.GNNPlanner.reconstruct
  fpath: assets/pretrained/success_best.pt
project: lagat
seed: 42
device: cuda:1
wandb: true
save_animation: false
num_epochs: 100
n_jobs: 10
dataset_dir: outputs/imitation_learning_dataset/dense_maze_1500
dataset_split:
  _target_: torch.utils.data.random_split
  lengths:
  - 0.8
  - 0.2
dataloader:
  _target_: torch_geometric.loader.DataLoader
  batch_size: 48
  shuffle: true
criterion:
  _target_: torch.nn.CrossEntropyLoss
optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-05
  weight_decay: 0.05
scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${num_epochs}
  eta_min: 1.0e-06
online_evaluation:
  use: true
  num_samples: 100
  every_epoch: 4
  run_model:
    max_episodes: 128
    sampling_temperature: 1.0
    animation: ${save_animation}
    device: ${device}
  dataset_aggregation: true

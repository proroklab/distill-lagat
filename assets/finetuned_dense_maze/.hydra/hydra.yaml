hydra:
  run:
    dir: outputs/train/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - wandb=true
    - device=cuda:1
    - dataset_dir=outputs/imitation_learning_dataset/dense_maze_1500
    - dataloader.batch_size=48
    - num_epochs=100
    - online_evaluation.num_samples=100
    - online_evaluation.dataset_aggregation=True
    - model=reconstruct
    - model.fpath=assets/pretrained/success_best.pt
    - grid_config=dense_maze
    - optimizer.lr=1e-5
  job:
    name: train
    chdir: null
    override_dirname: dataloader.batch_size=48,dataset_dir=outputs/imitation_learning_dataset/dense_maze_1500,device=cuda:1,grid_config=dense_maze,model.fpath=assets/pretrained/success_best.pt,model=reconstruct,num_epochs=100,online_evaluation.dataset_aggregation=True,online_evaluation.num_samples=100,optimizer.lr=1e-5,wandb=true
    id: ???
    num: ???
    config_name: train
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /local/scratch/ko393/hgnn/distil
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /local/scratch/ko393/hgnn/distil/scripts/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /local/scratch/ko393/hgnn/distil/outputs/train/2025-09-11_16-25-25
    choices:
      model: reconstruct
      grid_config: dense_maze
      expert: lacam3
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
